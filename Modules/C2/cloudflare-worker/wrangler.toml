name              = "cipherfall-c2"
main              = "worker.js"
compatibility_date = "2024-11-01"

# Create the KV namespace first:
#   wrangler kv:namespace create "C2_KV"
# Then paste the returned id below.
[[kv_namespaces]]
binding = "KV"
id      = "YOUR_KV_NAMESPACE_ID" 

# Set the shared secret (must match HMAC-SHA256(PSK, "worker_token")[:32]):
#   wrangler secret put WORKER_SECRET
